# ============================================
# Product Service — PRODUCTION Profile
# Active when: SPRING_PROFILES_ACTIVE=prod
# Values injected via ECS Task Definition env vars / Secrets Manager
# ============================================
server.port=8081

# RDS PostgreSQL — credentials injected by ECS at runtime
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Connection pool tuning for Fargate
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# H2 Console disabled in production
spring.h2.console.enabled=false

# Actuator — only health exposed publicly (others via internal VPC)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoints.web.cors.allowed-origins=*
management.endpoints.web.cors.allowed-methods=GET,OPTIONS

# Minimal logging for production
logging.level.com.example=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
